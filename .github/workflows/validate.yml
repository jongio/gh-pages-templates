name: Validate templates

# Gates every push/PR: validates each template's manifest + Pages workflow and
# that the generator stamps it with no leftover placeholders.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate
        run: node scripts/validate.mjs
