name: Build & deploy gallery to GitHub Pages

# Assembles the browsable gallery (with live template previews) and publishes it.
# Set Settings → Pages → Source to "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Ruby (for the Jekyll preview)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build site (gallery + live previews)
        env:
          # configure-pages emits the project base path (e.g. /gh-pages-templates)
          PAGES_BASE: ${{ steps.pages.outputs.base_path }}
          PAGES_REPO: ${{ github.repository }}
        run: node scripts/build-site.mjs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
